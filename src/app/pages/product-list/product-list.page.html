<div>
  <input class="input" type="text" placeholder="Search products..." (input)="onSearchInput($event)" />

  <app-modal-product-detail [productId]="selectedProductId" *ngIf="showModal" (close)="closeModal()" (success)="showSuccessMessage = true"></app-modal-product-detail>
  <div class="notification is-success" *ngIf="showSuccessMessage">
    <button class="delete" (click)="showSuccessMessage = false"></button>
    Se guardó con éxito
  </div>
  <table class="table">
    <thead>
      <tr>
        <th>Thumbnail</th>
        <th>Product</th>
        <th>SKU</th>
        <th>Brand</th>
        <th>Category</th>
        <th>Price</th>
        <th>Discount</th>
        <th>Stock</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let product of products">
        <td>
          <img [src]="product.thumbnail" class="image is-128x128" alt="Product Image">
        </td>
        <td><span class="product-name" (click)="openModal(product.id)">{{ product.title }}</span></td>
        <td>{{ product.sku }}</td>
        <td>{{ product.brand }}</td>
        <td>{{ product.category }}</td>
        <td>${{ product.price.toFixed(2) }}</td>
        <td>{{ product.discountPercentage }}%</td>
        <td>{{ product.stock }}</td>
        <td>{{ product.availabilityStatus }}</td>
      </tr>
    </tbody>
  </table>


</div>
